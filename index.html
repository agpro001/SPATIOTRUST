<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SpatioTrust — Decentralized Spatial Oracle Network</title>
    <meta
      name="description"
      content="Verify the physical integrity of real-world 3D environments before releasing on-chain funds. ZK-proof attested spatial oracles."
    />
    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #0a0a0a; color: #f5f5f5; font-family: system-ui, -apple-system, sans-serif; }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #0a0a0a; z-index: 9999; transition: opacity .3s ease;
      }
      #boot .dot {
        width: 10px; height: 10px; border-radius: 9999px;
        background: #f5f5f5; animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .3; transform: scale(.85);} 50% { opacity: 1; transform: scale(1);} }
      #boot-fallback {
        display: none; max-width: 28rem; text-align: center; padding: 1.5rem;
      }
      #boot-fallback h1 { font-size: 1.1rem; margin: 0 0 .5rem; }
      #boot-fallback p { color: #a3a3a3; margin: 0 0 1rem; font-size: .9rem; }
      #boot-fallback button {
        background: #f5f5f5; color: #0a0a0a; border: 0;
        padding: .55rem 1rem; border-radius: .375rem; cursor: pointer; font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot" aria-hidden="true">
      <div class="dot" id="boot-spinner"></div>
      <div id="boot-fallback">
        <h1>This page didn't load</h1>
        <p id="boot-error-msg">Something went wrong while starting the app.</p>
        <button onclick="location.reload()">Try again</button>
      </div>
    </div>
    <script>
      (function () {
        // Runtime error capture with stack traces — logs to console + window.__APP_ERRORS__
        window.__APP_ERRORS__ = window.__APP_ERRORS__ || [];
        function record(kind, err) {
          var entry = {
            kind: kind,
            time: new Date().toISOString(),
            message: (err && err.message) || String(err),
            stack: (err && err.stack) || null,
          };
          window.__APP_ERRORS__.push(entry);
          try { console.error("[app:" + kind + "]", entry.message, entry.stack || ""); } catch (e) {}
        }
        window.addEventListener("error", function (e) { record("error", e.error || e.message); });
        window.addEventListener("unhandledrejection", function (e) { record("unhandledrejection", e.reason); });

        // If React never mounts within 12s, reveal a retry fallback instead of an
        // infinite spinner. Mount is detected by #root having any child node.
        function showFallback(msg) {
          var fb = document.getElementById("boot-fallback");
          var sp = document.getElementById("boot-spinner");
          if (sp) sp.style.display = "none";
          if (fb) {
            fb.style.display = "block";
            if (msg) {
              var m = document.getElementById("boot-error-msg");
              if (m) m.textContent = msg;
            }
          }
        }
        var startedAt = Date.now();
        var poll = setInterval(function () {
          var root = document.getElementById("root");
          if (root && root.firstChild) {
            var boot = document.getElementById("boot");
            if (boot) { boot.style.opacity = "0"; setTimeout(function(){ boot.remove(); }, 300); }
            clearInterval(poll);
            return;
          }
          if (Date.now() - startedAt > 12000) {
            clearInterval(poll);
            var last = window.__APP_ERRORS__[window.__APP_ERRORS__.length - 1];
            showFallback(last ? last.message : null);
          }
        }, 200);
      })();
    </script>
    <script type="module" src="/src/entry.client.tsx"></script>
  </body>
</html>
